<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicação visual automática de Pedra, Papel e Tesoura com emojis se movendo pela tela">
    <title>Pedra, Papel e Tesoura - Automático</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Painel de Estatísticas -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-emoji">🪨</div>
                <div class="stat-label">Pedras:</div>
                <div class="stat-count" id="stoneCount">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-emoji">📄</div>
                <div class="stat-label">Papéis:</div>
                <div class="stat-count" id="paperCount">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-emoji">✂️</div>
                <div class="stat-label">Tesouras:</div>
                <div class="stat-count" id="scissorsCount">30</div>
            </div>
        </div>

        <!-- Painel de Controles -->
        <div class="controls">
            <!-- Controles de Velocidade -->
            <div class="velocity-controls">
                <button id="decreaseVelocityBtn" class="btn btn-velocity" title="Diminuir velocidade">🔽</button>
                <div class="velocity-display">
                    <span id="velocityLabel">Velocidade:</span>
                    <span id="velocityValue" class="velocity-value">100%</span>
                </div>
                <button id="increaseVelocityBtn" class="btn btn-velocity" title="Aumentar velocidade">🔼</button>
            </div>

            <span id="winner" class="winner-text"></span>
        </div>

        <div class="legal-dock" aria-label="Links legais">
            <a href="sobre.html">Sobre</a>
            <span aria-hidden="true">•</span>
            <a href="contato.html">Contato</a>
            <span aria-hidden="true">•</span>
            <a href="privacidade.html">Privacidade</a>
            <span aria-hidden="true">•</span>
            <a href="termos.html">Termos</a>
        </div>

        <!-- Tela de Vitória (Modal) -->
        <div id="victoryModal" class="victory-modal hidden">
            <div class="victory-content">
                <div class="victory-header">
                    <h1>🎉 VITÓRIA! 🎉</h1>
                </div>
                <div class="victory-body">
                    <div class="victory-emoji" id="victoryEmoji"></div>
                    <p class="victory-message">
                        <span id="victoryType"></span> venceu!
                    </p>
                    <p class="victory-subtitle">Dominou toda a tela</p>
                    <p class="victory-countdown">Reiniciando em <span id="victoryCountdown">5</span>s</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/constants.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/game.js"></script>
    <script src="js/input-manager.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
